<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Jeff Chat - Bread N' Butter</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>

  <div class="navbar">
    <h2>Bread N' Butter</h2>
    <div class="nav-links">
      <a href="index.html"><i class="fas fa-home"></i> Home</a>
      <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="learn.html"><i class="fas fa-book-open"></i> Learn</a>
      <a href="bread.html"><i class="fas fa-wallet"></i> Bread</a>
      <a href="chat.html" class="active"><i class="fas fa-robot"></i> Jeff</a>
      <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
    </div>
  </div>

  <div class="container">
    <h1>Talk to Jeff</h1>

    <div class="chat-box" id="chat-box">
      <div class="message jeff">Hi, I'm Jeff! Ask me anything about your finances.</div>
    </div>

    <div class="input-area">
      <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off"/>
      <button id="send-btn">Send</button>
    </div>
  </div>

<script>
  const chatBox = document.getElementById('chat-box');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  function addMessage(text, sender) {
    const msg = document.createElement('div');
    msg.classList.add('message', sender);
    msg.textContent = text;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function getJeffReply(userMsg) {
    const msg = userMsg.toLowerCase().trim();

    if (msg === "how can i cut costs and still get coffee from starbucks every morning?") {
      return "Try getting your coffee at Dunkin' Donuts instead, a Medium Iced Coffee is typically around $2.79–$3.39 at Dunkin', compared to $3.95+ at Starbucks.";
    } else if (msg === "hey jeff.. i really need to save money but starbucks is just soo good") {
      return "thats so real, i completely understand how good coffee is, maybe try dunkin donuts coffee? its cheaper than starbucks!";
    } else {
      return "Hello, this is a free demo. Therefore I cannot answer your question. Please try one of the two phrases:  "How can I cut costs and still get coffee from Starbucks every morning?" or "hey jeff.. i really need to save money but starbucks is just soo good" "
    }
  }

  function sendMessage() {
    const userMsg = userInput.value.trim();
    if (!userMsg) return;

    addMessage(userMsg, 'user');
    userInput.value = '';

    setTimeout(() => {
      const reply = getJeffReply(userMsg);
      addMessage(reply, 'jeff');
    }, 1000);
  }

  sendBtn.addEventListener('click', sendMessage);
  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });
</script>

</body>
</html>
<footer class="footer">
  <a href="mailto:breadnbutterfinances@gmail.com">Contact Us</a>
</footer>
